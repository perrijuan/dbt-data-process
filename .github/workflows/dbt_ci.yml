name: dbt CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install dbt-core==1.9.* dbt-bigquery==1.9.*

      - name: Baixar manifest da produção
        uses: dawidd6/action-download-artifact@v6
        with:
          name: dbt-artifacts
          path: prod-state/
          workflow: dbt.yml
          branch: main
        continue-on-error: true

      - name: Criar profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          bndes:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: safraviva-f1
                dataset: ci_pr_${{ github.event.number }}
                location: US
                threads: 4
          EOF

      - run: dbt deps

      - name: Build incremental
        run: |
          if [ -f prod-state/manifest.json ]; then
            dbt build --select state:modified+ --defer --state prod-state/
          else
            dbt build
          fi
